version: '3.8'

services:
  mmnx:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/mmnx.sqlite
      - NEXT_PUBLIC_APP_NAME=mmnx
    volumes:
      - mmnx_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mmnx_data:
    driver: local
